<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEmbedded Car - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Imagen del carro -->
        <img src="{{ url_for('static', filename='car_logo_bg.png') }}" class="logo" alt="Car Logo">

        <!-- Título -->
        <h1>CEmbedded Car</h1>
        <h2>Iniciar Sesión</h2>

        <!-- Formulario de login -->
        <form method="POST">
            <input name="username" placeholder="Usuario" required><br>
            <input name="password" type="password" placeholder="Contraseña" required><br>
            <button type="submit">Entrar</button>
        </form>

        <!-- Mensaje de error -->
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <!-- Link de registro -->
        <p>¿No tienes cuenta? <a href="{{ url_for('main.register') }}">Regístrate aquí</a></p>
    </div>
</body>
</html>
