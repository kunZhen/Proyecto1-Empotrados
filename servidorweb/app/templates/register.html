<!DOCTYPE html>
<html lang="es">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='car.png') }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEmbedded Car - Registro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <img src="{{ url_for('static', filename='car_logo_bg.png') }}" class="logo" alt="Car Logo">

        <!-- Título -->
        <h1>CEmbedded Car</h1>
        <h2>Registro</h2>

        <!-- Formulario de registro -->
        <form method="POST">
            <input name="username" placeholder="Usuario" required><br>
            <input name="email" type="email" placeholder="Correo" required><br>
            <input name="password" type="password" placeholder="Contraseña" required><br>
            <button type="submit">Registrar</button>
        </form>

        <!-- Link al login -->
        <p>¿Ya tienes cuenta? <a href="{{ url_for('main.login') }}">Inicia sesión</a></p>
    </div>
</body>
</html>
