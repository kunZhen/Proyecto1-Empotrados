<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control del Vehículo</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      background-color: #1a1f29;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #dce6f0;
      text-align: center;
    }
    .control-panel {
      background: #3D4D61;
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 1000px;
      margin: 30px auto;
      color: #dce6f0;
      box-shadow: 0px 8px 25px rgba(0,0,0,0.5);
    }
    .row {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 15px 0;
      flex-wrap: wrap;
    }
    button {
      padding: 15px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #1b2b3c;
      color: #fff;
      transition: background 0.3s;
    }
    button:hover { background: #27445c; }
    .status, .camera {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #dce6f0;
      border-radius: 8px;
      background: #2c3e50;
    }
    .camera img {
      width: 100%;
      height: auto;
      border-radius: 8px;
      border: 2px solid #dce6f0;
    }
    a {
      color: #fff;
      text-decoration: none;
      display: inline-block;
      margin-top: 15px;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="control-panel">
    <h2>🏎️ Control del Vehículo</h2>

    <!-- Movimiento -->
    <h3>🎮 Movimiento</h3>
    <div class="row">
      <button onclick="sendCommand('forward')">⬆️ Avanzar</button>
      <button onclick="sendCommand('backward')">⬇️ Retroceder</button>
      <button onclick="sendCommand('left')">⬅️ Izquierda</button>
      <button onclick="sendCommand('right')">➡️ Derecha</button>
      <button onclick="sendCommand('stop')">⏹️ Detener</button>
    </div>

    <!-- Luces -->
    <h3>💡 Luces</h3>
    <div class="row">
      <button onclick="sendCommand('warning_lights')">🚨 Precaución</button>
      <button onclick="sendCommand('front_right_light')">🔦 Frontal Derecha</button>
      <button onclick="sendCommand('front_left_light')">🔦 Frontal Izquierda</button>
      <button onclick="sendCommand('rear_right_light')">🔙 Trasera Derecha</button>
      <button onclick="sendCommand('rear_left_light')">🔙 Trasera Izquierda</button>
    </div>

    <!-- Estado -->
    <div class="status">
      <h3>📊 Estado</h3>
      <p id="velocidad">Velocidad: 80%</p>
      <p id="movimiento">Movimiento: Detenido</p>
    </div>

    <!-- Cámara -->
    <div class="camera">
      <h3>📷 Cámara en vivo</h3>
      <img src="{{ url_for('main.video_feed') }}" alt="Video del vehículo">
    </div>

    <a href="{{ url_for('main.dashboard') }}">⬅️ Volver al Dashboard</a>
  </div>

  <script>
    const API_URL = "{{ url_for('main.api_command') }}";
    const movimientoEl = document.getElementById("movimiento");
    const velocidadEl = document.getElementById("velocidad");

    let velocidad = 80;

    function sendCommand(command) {
      fetch(API_URL, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({command: command})
      })
      .then(response => response.json())
      .then(data => {
        console.log("Respuesta:", data);
        actualizarEstado(command);
      })
      .catch(err => console.error("Error:", err));
    }

    function actualizarEstado(cmd) {
      let texto = "";
      switch(cmd) {
        case "forward": texto = "Avanzando"; break;
        case "backward": texto = "Retrocediendo"; break;
        case "left": texto = "Girando a la izquierda"; break;
        case "right": texto = "Girando a la derecha"; break;
        case "stop": texto = "Detenido"; break;
        default: texto = "Comando: " + cmd;
      }
      movimientoEl.innerText = "Movimiento: " + texto;
    }
  </script>
</body>
</html>
