<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control del Vehículo</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='car.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body {
      background: #1a2634;
      font-family: "Segoe UI", sans-serif;
      color: #dce6f0;
      margin: 0;
      padding: 0;
    }

    .control-panel {
      background: #3D4D61;
      padding: 30px;
      border-radius: 15px;
      width: 90%;
      max-width: 1000px;
      margin: 30px auto;
      text-align: center;
      color: #dce6f0;
      box-shadow: 0px 8px 25px rgba(0,0,0,0.5);
    }

    h2, h3 { color: #f0f6ff; }

    .row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
      margin: 15px 0;
    }

    button {
      padding: 15px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #1b2b3c;
      color: #fff;
      transition: background 0.2s ease;
    }

    button:hover { background: #27445c; }

    .status, .camera {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #dce6f0;
      border-radius: 8px;
      background: #2c3e50;
    }

    iframe {
      border-radius: 8px;
    }

    a button {
      background: #324c67;
    }
    a button:hover {
      background: #456a8f;
    }
  </style>
</head>
<body>
  <div class="control-panel">
    <h2>🏎️ Control del Vehículo</h2>

    <!-- Movimiento -->
    <div class="row">
      <button onclick="sendCommand('avanzar')">⬆️ Avanzar</button>
      <button onclick="sendCommand('retroceder')">⬇️ Retroceder</button>
      <button onclick="sendCommand('izquierda')">⬅️ Izquierda</button>
      <button onclick="sendCommand('derecha')">➡️ Derecha</button>
      <button onclick="sendCommand('detener')">⛔ Detener</button>
    </div>

    <!-- Luces -->
    <h3>💡 Luces</h3>
    <div class="row">
      <button onclick="sendCommand('precaucion')">🚨 Precaución</button>
      <button onclick="sendCommand('frontal_derecha')">🔦 Frontal Derecha</button>
      <button onclick="sendCommand('frontal_izquierda')">🔦 Frontal Izquierda</button>
      <button onclick="sendCommand('trasera_derecha')">🔙 Trasera Derecha</button>
      <button onclick="sendCommand('trasera_izquierda')">🔙 Trasera Izquierda</button>
    </div>

    <!-- Estado -->
    <div class="status">
      <h3>📊 Estado</h3>
      <p>Velocidad: -- km/h</p>
      <p id="movimiento">Movimiento: --</p>
    </div>

    <!-- Cámara -->
    <div class="camera">
      <h3>📷 Cámara</h3>
      <!-- Aquí luego reemplazarás el iframe por el streaming real del carrito -->
      <iframe width="100%" height="300"
              src="https://www.youtube.com/embed/277D0mDXTBE?autoplay=1&mute=1&playsinline=1"
              frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <!-- Volver -->
    <a href="{{ url_for('main.dashboard') }}" style="margin-top: 20px; display: inline-block;">
      <button>Volver al Dashboard</button>
    </a>
  </div>

  <script>
    // ✅ Usamos la misma app Flask (no puerto 5001)
    const API_URL = "{{ url_for('main.api_command') }}";

    function sendCommand(command) {
      fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ command: command })
      })
      .then(r => r.json())
      .then(data => {
        console.log("Respuesta:", data);
        if (["avanzar","retroceder","izquierda","derecha","detener"].includes(command)) {
          document.getElementById("movimiento").innerText = "Movimiento: " + command;
        }
      })
      .catch(err => console.error("Error:", err));
    }
  </script>
</body>
</html>
