<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEmbedded Car - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(to right, #001F3F, #004466);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: #3D4D61;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.5);
            width: 400px;
        }
        
        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            color: #022B45;
            font-weight: bold;
        }
        
        h2 {
            margin-bottom: 20px;
            color: #ffffff;
        }
        
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            outline: none;
        }
        
        button {
            width: 95%;
            padding: 12px;
            background: #022B45;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
        }
        
        button:hover {
            background: #011c2b;
        }
        
        .error {
            color: #ff8080;
            margin-top: 10px;
            background: rgba(255, 128, 128, 0.1);
            padding: 10px;
            border-radius: 8px;
        }
        
        .info {
            margin-top: 20px;
            color: #dce6f0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>CEmbedded Car</h1>
        <h2>Iniciar Sesión</h2>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Usuario" required autofocus>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Entrar</button>
        </form>
        
        <div class="info">
            © 2025 CE-1113
        </div>
    </div>
</body>
</html>
