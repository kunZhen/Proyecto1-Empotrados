<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Vehículo Autónomo</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h1>Control de Vehículo Autónomo</h1>
        
        <div class="video-container">
            <img src="/video_feed" alt="Video Stream" style="width: 100%; height: auto;">
        </div>
        
        <div class="controls">
            <div class="control-row">
                <button id="btn-forward" class="control-btn">▲ Adelante</button>
            </div>
            <div class="control-row">
                <button id="btn-left" class="control-btn">◄ Izquierda</button>
                <button id="btn-stop" class="control-btn stop">■ Stop</button>
                <button id="btn-right" class="control-btn">► Derecha</button>
            </div>
            <div class="control-row">
                <button id="btn-backward" class="control-btn">▼ Atrás</button>
            </div>
        </div>
        
        <div class="speed-control">
            <label for="speed-slider">Velocidad: <span id="speed-value">80</span>%</label>
            <input type="range" id="speed-slider" min="0" max="100" value="80">
        </div>
        
        <div class="status">
            <p>Estado: <span id="status-text">Detenido</span></p>
        </div>
    </div>
    
    <script src="/static/control.js"></script>
</body>
</html>
