# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-myconfig"
BBFILE_PATTERN_meta-myconfig = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-myconfig = "6"

LAYERDEPENDS_meta-myconfig = "core"
LAYERSERIES_COMPAT_meta-myconfig = "scarthgap"
